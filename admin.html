<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Leads</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0B0E14;
            --surface: rgba(20, 24, 34, 0.7);
            --surface-border: rgba(255, 255, 255, 0.05);
            --primary: #3B82F6;
            --primary-glow: rgba(59, 130, 246, 0.3);
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.05), transparent 25%);
        }

        /* LOGIN SCREEN */
        #loginScreen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-box h2 {
            margin-bottom: 20px;
            font-weight: 600;
            background: linear-gradient(to right, #3B82F6, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--surface-border);
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
        }

        .error-msg {
            color: #EF4444;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* DASHBOARD */
        #dashboard {
            display: none;
            width: 100%;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background: var(--surface);
            border-right: 1px solid var(--surface-border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--surface-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header i {
            color: var(--primary);
            font-size: 20px;
        }

        .leads-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .lead-item {
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s ease;
            margin-bottom: 5px;
            border: 1px solid transparent;
        }

        .lead-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .lead-item.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--primary-glow);
        }

        .lead-name {
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .lead-time {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: normal;
        }

        .lead-preview {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.2);
        }

        .content-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--surface-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .contact-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: white;
            transition: 0.2s;
        }

        .btn-whatsapp { background: #22c55e; }
        .btn-whatsapp:hover { background: #16a34a; }

        .chat-view {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 14px;
        }

        .msg-client {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-bottom-left-radius: 5px;
        }

        .msg-ai {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .no-selection {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
        }

        .no-selection i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-box">
            <h2><i class="fas fa-lock"></i> Admin Access</h2>
            <div class="input-group">
                <input type="text" id="adminId" placeholder="Admin ID">
            </div>
            <div class="input-group">
                <input type="password" id="adminPass" placeholder="Password">
            </div>
            <button class="login-btn" onclick="checkLogin()">Login</button>
            <div class="error-msg" id="errorMsg">Invalid ID or Password</div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-robot"></i>
                <h3>AI Leads Hub</h3>
            </div>
            <div class="leads-list" id="leadsList">
                <!-- Leads will be injected here -->
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content" id="mainContent">
            <div class="no-selection">
                <i class="fas fa-inbox"></i>
                <h2>Select a lead to view conversation</h2>
            </div>
        </div>
    </div>

    <script>
        // HARDCODED CREDENTIALS (Secure enough for hidden route)
        const ADMIN_ID = "shahrukh";
        const ADMIN_PASS = "admin123";

        let allLeads = [];

        function checkLogin() {
            const id = document.getElementById('adminId').value;
            const pass = document.getElementById('adminPass').value;
            
            if(id === ADMIN_ID && pass === ADMIN_PASS) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                fetchLeads();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        // Allow Enter key to login
        document.getElementById('adminPass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkLogin();
        });

        async function fetchLeads() {
            try {
                const response = await fetch('/api/leads');
                const leads = await response.json();
                
                // Sort by newest first
                allLeads = leads.reverse();
                renderLeadsList();
            } catch(e) {
                console.error("Error fetching leads:", e);
                document.getElementById('leadsList').innerHTML = '<div style="padding:20px; text-align:center; color:red;">Failed to load leads. Make sure server is running.</div>';
            }
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function renderLeadsList() {
            const list = document.getElementById('leadsList');
            list.innerHTML = '';
            
            if(allLeads.length === 0) {
                list.innerHTML = '<div style="padding:20px; text-align:center; color:#9CA3AF;">No leads captured yet.</div>';
                return;
            }

            allLeads.forEach((lead, index) => {
                const div = document.createElement('div');
                div.className = 'lead-item';
                div.onclick = () => showLeadDetails(index, div);
                
                div.innerHTML = `
                    <div class="lead-name">
                        ${lead.name !== 'Unknown Visitor' ? lead.name : 'Guest Visitor'}
                        <span class="lead-time">${formatDate(lead.timestamp)}</span>
                    </div>
                    <div class="lead-preview">${lead.project || 'General Inquiry'}</div>
                    <span class="badge"><i class="fab fa-whatsapp"></i> ${lead.whatsapp !== 'Not collected' ? 'Captured' : 'Pending'}</span>
                `;
                list.appendChild(div);
            });
        }

        function showLeadDetails(index, element) {
            // Update active state
            document.querySelectorAll('.lead-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const lead = allLeads[index];
            const main = document.getElementById('mainContent');

            // Generate Chat HTML
            let chatHTML = '';
            if(lead.conversation && lead.conversation.length > 0) {
                lead.conversation.forEach(msg => {
                    const roleClass = msg.role === 'user' ? 'msg-client' : 'msg-ai';
                    chatHTML += `<div class="msg-bubble ${roleClass}">${msg.content.replace(/\n/g, '<br>')}</div>`;
                });
            } else {
                chatHTML = '<div class="no-selection">No conversation data available.</div>';
            }

            // WhatsApp link
            let waBtn = '';
            if(lead.whatsapp && lead.whatsapp !== 'Not collected') {
                const phone = lead.whatsapp.replace(/[^0-9]/g, '');
                waBtn = `<a href="https://wa.me/${phone}" target="_blank" class="action-btn btn-whatsapp"><i class="fab fa-whatsapp"></i> Message on WhatsApp</a>`;
            }

            main.innerHTML = `
                <div class="content-header">
                    <div>
                        <h2>${lead.name !== 'Unknown Visitor' ? lead.name : 'Guest Visitor'}</h2>
                        <div style="color: var(--text-muted); font-size: 14px; margin-top: 5px;">
                            <i class="fas fa-phone"></i> ${lead.whatsapp} | 
                            <i class="fas fa-briefcase"></i> ${lead.project}
                        </div>
                    </div>
                    <div class="contact-actions">
                        ${waBtn}
                    </div>
                </div>
                <div class="chat-view">
                    ${chatHTML}
                </div>
            `;
        }
    </script>
</body>
</html>
